apiVersion: v1
kind: Service
metadata:
  name: jwt-backend
  namespace: default
  labels:
    app: jwt-auth
    component: backend
spec:
  selector:
    app: jwt-auth
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-frontend
  namespace: default
  labels:
    app: jwt-auth
    component: frontend
spec:
  selector:
    app: jwt-auth
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-postgres
  namespace: default
  labels:
    app: jwt-auth
    component: database
spec:
  selector:
    app: jwt-auth
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-redis
  namespace: default
  labels:
    app: jwt-auth
    component: cache
spec:
  selector:
    app: jwt-auth
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
